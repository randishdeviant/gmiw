<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interactive Map Wrapper</title>
    <!-- Preconnect: DNS+TCP siap tanpa download konten (menghemat RAM) -->
    <link rel="preconnect" href="https://act-webstatic.hoyoverse.com" crossorigin>
    <link rel="preconnect" href="https://act.hoyolab.com" crossorigin>
    <link rel="preconnect" href="https://webstatic.hoyoverse.com" crossorigin>
    <link rel="preconnect" href="https://sdk.hoyolab.com" crossorigin>
    <link rel="dns-prefetch" href="https://sg-public-api.hoyolab.com">
    <link rel="dns-prefetch" href="https://sg-public-api-static.hoyolab.com">
    <link rel="dns-prefetch" href="https://api-community-v2.hoyolab.com">
    <style>
        /* Reset & Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* Tampilan Notifikasi Rotasi (Portrait) */
        #rotate-notice {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
            padding: 30px;
            z-index: 10;
            position: relative;
        }

        .icon-phone {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            animation: rotateHint 2.5s ease-in-out infinite;
        }

        #rotate-notice h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        #rotate-notice p {
            font-size: 0.95rem;
            color: #aaaaaa;
            line-height: 1.4;
            max-width: 280px;
        }

        /* Iframe — content-visibility:auto skip render saat hidden, hemat RAM */
        #map-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            touch-action: manipulation;
            -ms-touch-action: manipulation;
            transform: translate3d(0, 0, 0);
            content-visibility: auto;
        }

        /* Overlay tombol fullscreen */
        #fs-overlay {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 999;
            display: none;
        }
        #fs-overlay button {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.15s;
        }
        #fs-overlay button:active {
            background: rgba(0, 0, 0, 0.7);
        }
        #fs-overlay button svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Animasi Handphone Berputar */
        @keyframes rotateHint {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Portrait notice — tampil hanya jika portrait -->
    <div id="rotate-notice">
        <svg class="icon-phone" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <path d="M12 18h.01"></path>
        </svg>
        <h2>Mode Landscape Diperlukan</h2>
        <p>Aktifkan fitur Auto-Rotate pada HP Anda, lalu putar HP ke posisi mendatar untuk membuka map.</p>
    </div>

    <!-- Fullscreen overlay button -->
    <div id="fs-overlay">
        <button id="fs-btn" onclick="requestFullscreenAndLoad()" aria-label="Fullscreen">
            <svg viewBox="0 0 24 24">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <line x1="21" y1="3" x2="14" y2="10"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
        </button>
    </div>

    <!--
        Iframe dengan src langsung di HTML!
        Browser langsung mulai fetch konten tanpa nunggu JS.
        Tidak ada race condition, tidak ada iframe stuck loading.
    -->
    <iframe 
        id="map-frame" 
        src="https://act.hoyolab.com/ys/app/interactive-map/index.html"
        loading="eager"
        referrerpolicy="no-referrer"
        allow="fullscreen"
        importance="high">
    </iframe>

    <script>
        "use strict";

        const frame = document.getElementById('map-frame');
        const notice = document.getElementById('rotate-notice');
        const fsOverlay = document.getElementById('fs-overlay');

        // === Safety: timeout reload jika iframe gagal load ===
        // Jika dalam 15 detik iframe tidak selesai load, anggap stuck
        let loadAttempts = 0;
        const MAX_ATTEMPTS = 2;
        let loadTimeout = null;

        function resetLoadTimeout() {
            if (loadTimeout) clearTimeout(loadTimeout);
            loadTimeout = setTimeout(() => {
                if (loadAttempts < MAX_ATTEMPTS) {
                    loadAttempts++;
                    console.warn(`[Map] Iframe timeout (attempt ${loadAttempts}). Reloading...`);
                    frame.src = frame.src; // Trigger reload
                    resetLoadTimeout();
                } else {
                    console.error('[Map] Iframe gagal load setelah 2 percobaan.');
                }
            }, 15000);
        }

        frame.addEventListener('load', () => {
            if (loadTimeout) clearTimeout(loadTimeout);
            loadAttempts = 0;
            console.log('[Map] Iframe loaded successfully');
        });

        // Start timeout jika iframe belum loaded dalam 15 detik
        // Cek apakah iframe sudah ter-load (untuk kasudah loaded sebelum JS jalan)
        // Kita tidak bisa cek contentDocument (cross-origin), jadi langsung start timeout
        setTimeout(() => {
            // Jika iframe blm trigger load event, timeout akan handle
            if (loadAttempts === 0) {
                resetLoadTimeout();
            }
        }, 1000);

        // === Orientation handling ===
        function checkOrientation() {
            if (window.innerWidth > window.innerHeight) {
                // Landscape: sembunyikan notice, tampilkan map + overlay FS
                notice.style.display = 'none';
                fsOverlay.style.display = 'block';
            } else {
                // Portrait: tampilkan notice, sembunyikan map + overlay
                notice.style.display = 'flex';
                fsOverlay.style.display = 'none';
            }
        }

        function requestFullscreenAndLoad() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
            fsOverlay.style.display = 'none';
        }

        function onFullscreenChange() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                fsOverlay.style.display = 'none';
            } else if (window.innerWidth > window.innerHeight) {
                fsOverlay.style.display = 'block';
            }
        }

        // === Listeners ===
        document.addEventListener('fullscreenchange', onFullscreenChange, { passive: true });
        document.addEventListener('webkitfullscreenchange', onFullscreenChange, { passive: true });

        window.addEventListener('resize', checkOrientation, { passive: true });
        window.addEventListener('load', checkOrientation, { passive: true });

        if (screen.orientation) {
            screen.orientation.addEventListener('change', checkOrientation);
        }

        // Initial check — map langsung tampil di PC (landscape)
        checkOrientation();
    </script>
</body>
</html>
