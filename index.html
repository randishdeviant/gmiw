<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interactive Map Wrapper</title>
    <!-- Preconnect ke CDN tile & aset Hoyoverse agar DNS + TLS setup lebih cepat -->
    <link rel="preconnect" href="https://act-webstatic.hoyoverse.com" crossorigin>
    <link rel="preconnect" href="https://act.hoyolab.com" crossorigin>
    <link rel="preconnect" href="https://webstatic.hoyoverse.com" crossorigin>
    <link rel="preconnect" href="https://sdk.hoyolab.com" crossorigin>
    <link rel="dns-prefetch" href="https://sg-public-api.hoyolab.com">
    <link rel="dns-prefetch" href="https://sg-public-api-static.hoyolab.com">
    <link rel="dns-prefetch" href="https://api-community-v2.hoyolab.com">
    <style>
        /* Reset & Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* Tampilan Notifikasi Rotasi (Portrait) */
        #rotate-notice {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
            padding: 30px;
            z-index: 10;
            position: relative;
        }

        .icon-phone {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            animation: rotateHint 2.5s ease-in-out infinite;
        }

        #rotate-notice h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        #rotate-notice p {
            font-size: 0.95rem;
            color: #aaaaaa;
            line-height: 1.4;
            max-width: 280px;
        }

        /* Optimasi Iframe (Landscape) dengan GPU rendering */
        #map-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            /* GPU compositing layer — render via GPU bukan CPU */
            will-change: transform;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            contain: strict;
            touch-action: none;
        }

        /* Overlay tombol fullscreen (icon) di atas map */
        #fs-overlay {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 999;
            display: none;
        }
        #fs-overlay button {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.55);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: background 0.2s;
        }
        #fs-overlay button:active {
            background: rgba(0, 0, 0, 0.8);
        }
        #fs-overlay button svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Animasi Handphone Berputar */
        @keyframes rotateHint {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Layar instruksi saat HP dalam posisi tegak -->
    <div id="rotate-notice">
        <!-- SVG Icon HP Berputar -->
        <svg class="icon-phone" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <path d="M12 18h.01"></path>
        </svg>
        <h2>Mode Landscape Diperlukan</h2>
        <p>Aktifkan fitur Auto-Rotate pada HP Anda, lalu putar HP ke posisi mendatar untuk membuka map.</p>
    </div>

    <!-- Tombol Fullscreen overlay (icon) di pojok kanan map -->
    <div id="fs-overlay">
        <button id="fs-btn" onclick="requestFullscreenAndLoad()" aria-label="Fullscreen">
            <svg viewBox="0 0 24 24">
                <polyline points="15 3 21 3 21 9"></polyline>
                <polyline points="9 21 3 21 3 15"></polyline>
                <line x1="21" y1="3" x2="14" y2="10"></line>
                <line x1="3" y1="21" x2="10" y2="14"></line>
            </svg>
        </button>
    </div>

    <!-- Elemen Iframe Map dengan optimasi kecepatan -->
    <iframe 
        id="map-frame" 
        loading="eager"
        referrerpolicy="no-referrer"
        allow="fullscreen"
        importance="high">
    </iframe>

    <script>
        const frame = document.getElementById('map-frame');
        const notice = document.getElementById('rotate-notice');
        const fsOverlay = document.getElementById('fs-overlay');
        
        // URL map interactive Genshin Impact
        const mapUrl = "https://act.hoyolab.com/ys/app/interactive-map/index.html";
        let mapLoaded = false;

        function loadMap() {
            if (mapLoaded) return;
            mapLoaded = true;
            frame.src = mapUrl;
        }

        function showLandscape() {
            loadMap();
            frame.style.display = 'block';
            notice.style.display = 'none';
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                fsOverlay.style.display = 'block';
            }
        }

        function showPortrait() {
            notice.style.display = 'flex';
            fsOverlay.style.display = 'none';
            frame.style.display = 'none';
        }

        function checkOrientation() {
            if (window.innerWidth > window.innerHeight) {
                showLandscape();
            } else {
                showPortrait();
            }
        }

        function requestFullscreenAndLoad() {
            let elem = document.documentElement;
            
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }

            loadMap();
            frame.style.display = 'block';
            notice.style.display = 'none';
        }

        function onFullscreenChange() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                fsOverlay.style.display = 'none';
            } else {
                if (window.innerWidth > window.innerHeight) {
                    fsOverlay.style.display = 'block';
                }
            }
        }

        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);

        const preloadLink = document.createElement('link');
        preloadLink.rel = 'prefetch';
        preloadLink.href = mapUrl;
        document.head.appendChild(preloadLink);

        window.addEventListener('resize', checkOrientation);
        window.addEventListener('load', checkOrientation);

        if (screen.orientation) {
            screen.orientation.addEventListener('change', checkOrientation);
        }

        function tryShowOnInteraction() {
            if (window.innerWidth > window.innerHeight && !mapLoaded) {
                showLandscape();
            }
        }
        window.addEventListener('touchstart', tryShowOnInteraction, { once: true });
        window.addEventListener('click', tryShowOnInteraction, { once: true });
    </script>
</body>
</html>
