<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Interactive Map Wrapper</title>
    <!-- Preconnect ke CDN tile & aset Hoyoverse agar DNS + TLS setup lebih cepat -->
    <link rel="preconnect" href="https://act-webstatic.hoyoverse.com" crossorigin>
    <link rel="preconnect" href="https://act.hoyolab.com" crossorigin>
    <link rel="preconnect" href="https://webstatic.hoyoverse.com" crossorigin>
    <link rel="preconnect" href="https://sdk.hoyolab.com" crossorigin>
    <link rel="dns-prefetch" href="https://sg-public-api.hoyolab.com">
    <link rel="dns-prefetch" href="https://sg-public-api-static.hoyolab.com">
    <link rel="dns-prefetch" href="https://api-community-v2.hoyolab.com">
    <style>
        /* Reset & Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* Tampilan Notifikasi Rotasi (Portrait) */
        #rotate-notice {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
            padding: 30px;
            z-index: 10;
            position: relative;
        }

        .icon-phone {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            animation: rotateHint 2.5s ease-in-out infinite;
        }

        #rotate-notice h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        #rotate-notice p {
            font-size: 0.95rem;
            color: #aaaaaa;
            line-height: 1.4;
            max-width: 280px;
        }

        /* Tombol Pemicu Fullscreen & Load Map */
        .btn-fullscreen {
            margin-top: 25px;
            padding: 12px 24px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
            transition: background 0.2s;
            display: none; /* Hanya muncul di kondisi tertentu via JS */
        }

        .btn-fullscreen:active {
            background-color: #0056b3;
        }

        /* Optimasi Iframe (Landscape) */
        #map-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            /* GPU compositing layer untuk iframe */
            will-change: transform;
            transform: translate3d(0, 0, 0);
            /*
             * touch-action: none — beri map JS kontrol penuh atas semua gesture.
             * Ini mencegah browser 'merebut' touchmove event sebelum map bisa handle,
             * yang menyebabkan error [Intervention] dan panning terasa patah-patah.
             * Map Hoyolab menggunakan canvas-based pan/zoom sendiri.
             */
            touch-action: none;
        }

        /* Animasi Handphone Berputar */
        @keyframes rotateHint {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(-90deg); }
            70% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <!-- Layar instruksi saat HP dalam posisi tegak -->
    <div id="rotate-notice">
        <!-- SVG Icon HP Berputar -->
        <svg class="icon-phone" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
            <path d="M12 18h.01"></path>
        </svg>
        <h2>Mode Landscape Diperlukan</h2>
        <p>Aktifkan fitur Auto-Rotate pada HP Anda, lalu putar HP ke posisi mendatar untuk membuka map.</p>
        <button class="btn-fullscreen" id="fs-trigger" onclick="requestFullscreenAndLoad()">Buka Map Fullscreen</button>
    </div>

    <!-- Elemen Iframe Map dengan optimasi kecepatan -->
    <iframe 
        id="map-frame" 
        src=""
        loading="eager"
        referrerpolicy="no-referrer"
        allow="fullscreen"
        importance="high">
    </iframe>

    <script>
        const frame = document.getElementById('map-frame');
        const notice = document.getElementById('rotate-notice');
        const fsTriggerBtn = document.getElementById('fs-trigger');
        
        // URL map interactive Genshin Impact
        const mapUrl = "https://act.hoyolab.com/ys/app/interactive-map/index.html";

        function checkOrientation() {
            const isLandscape = window.innerWidth > window.innerHeight;

            if (isLandscape) {
                // Load iframe immediately for fastest rendering (no user click needed)
                if (!frame.src) {
                    frame.src = mapUrl;
                }
                frame.style.display = 'block';
                notice.style.display = 'none';
                fsTriggerBtn.style.display = 'none';
            } else {
                notice.style.display = 'flex';
                fsTriggerBtn.style.display = 'none';
                frame.style.display = 'none';
            }
        }

        function requestFullscreenAndLoad() {
            let elem = document.documentElement;
            
            // Pemicu Fullscreen API agar Address Bar hilang total
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari / iOS */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE/Edge */
                elem.msRequestFullscreen();
            }

            // Sembunyikan notifikasi dan tampilkan map (sudah di-load di atas)
            notice.style.display = 'none';
            frame.style.display = 'block';
        }

        // Preload iframe src untuk faster rendering ketika landscape
        const preloadLink = document.createElement('link');
        preloadLink.rel = 'prefetch';
        preloadLink.href = mapUrl;
        document.head.appendChild(preloadLink);

        // Deteksi perubahan ukuran layar (rotasi HP)
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('load', checkOrientation);

    </script>
</body>
</html>
